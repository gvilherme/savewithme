name: Docker Build & Push (ECR)

on:
  push:
    branches: [ "main", "dev" ]   # main=prod, dev=dev
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    environment: ${{ startsWith(github.ref, 'refs/heads/main') && 'prod' || 'dev' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ vars.JAVA_TOOLCHAIN_VERSION || 21 }}
          cache: maven

      - name: Build JAR
        working-directory: app
        run: mvn -B -U -ntp -DskipTests package

      - name: Build & tag image
        working-directory: infra/docker
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION:     ${{ vars.AWS_REGION }}
          ECR_REPO:       ${{ vars.ECR_REPO }}
          DOCKER_IMAGE_BASE: ${{ vars.DOCKER_IMAGE_BASE }}
        run: |
          IMAGE=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}
          GIT_TAG=${GITHUB_SHA::7}
          docker build \
            -t ${IMAGE}:${GIT_TAG} \
            -t ${IMAGE}:latest \
            --build-arg BASE_IMAGE="${DOCKER_IMAGE_BASE}" \
            -f Dockerfile ../../
          echo "IMAGE_URI=${IMAGE}:${GIT_TAG}" >> $GITHUB_ENV

      - name: Push
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION:     ${{ vars.AWS_REGION }}
          ECR_REPO:       ${{ vars.ECR_REPO }}
        run: |
          IMAGE=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}
          docker push ${IMAGE}:latest
          docker push ${IMAGE}:${GITHUB_SHA::7}

      - name: WhoAmI (AWS)
        run: aws sts get-caller-identity
