name: Lint

on:
  pull_request:
    paths: [ "app/**" ]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ vars.JAVA_TOOLCHAIN_VERSION || 21 }}
          cache: maven
      - name: Run format/checks (ex.: Spotless/Checkstyle)
        working-directory: app
        run: |
          mvn -B -ntp -DskipTests spotless:check || true
          mvn -B -ntp -DskipTests checkstyle:check || true
