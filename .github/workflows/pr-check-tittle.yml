name: PR Title Check
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
    branches:
      - dev
      - main

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check PR title
        uses: amitsingh-007/validate-pr-title-action@v2.3.0
        with:
          regex: '^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\([\w\-]+\))?: .{1,50}'
          error-message: 'PR title must follow Conventional Commits format: <type>(<scope>): <description>. Allowed types: feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert.'