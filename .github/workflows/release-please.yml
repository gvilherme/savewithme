name: Release Please

on:
  push:
    branches: [ "main" ]   # release é gerado a partir do main (padrão)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        uses: google-github-actions/release-please-action@v4
        with:
          command: manifest
          config-file: .github/release-please-config.json
          manifest-file: .release-please-manifest.json
