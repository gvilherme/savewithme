# application-gen.yaml
spring:
  # use um H2 em memória só pra não depender de Postgres neste profile
  datasource:
    url: jdbc:h2:mem:gen;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none  # NÃO aplicar no banco
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      # ======= geração de scripts via JPA (Jakarta) =======
      jakarta.persistence.schema-generation.scripts.action: create
      jakarta.persistence.schema-generation.create-source: metadata
      jakarta.persistence.schema-generation.scripts.create-target: target/generated-schema.sql
      jakarta.persistence.schema-generation.scripts.drop-target: target/generated-drop.sql

