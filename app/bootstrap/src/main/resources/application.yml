spring:
  application:
    name: savewithme
  flyway:
    enabled: true
    locations: classpath:db/migration/identity
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

security:
  jwt:
    issuer: https://savewithme.app
    expiration: PT2H
    alg: RS256
    private-key-pem: ${JWT_PRIVATE_PEM}
    public-key-pem: ${JWT_PUBLIC_PEM}

server:
  port: 8080
